name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin/universal
            artifact: csm-gui-darwin
            ext: ""
          - os: windows-latest
            platform: windows/amd64
            artifact: csm-gui-windows-amd64
            ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          wails build -platform darwin/universal -clean
          cd build/bin
          ditto -c -k --sequesterRsrc --keepParent csm.app csm-gui-darwin.zip

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          wails build -platform windows/amd64 -clean
          cd build/bin
          Compress-Archive -Path csm.exe -DestinationPath csm-gui-windows-amd64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/bin/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false

  update-scoop:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Update Scoop manifest
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION_NUM="${VERSION#v}"

          ZIP_PATH=$(find artifacts/ -name 'csm-gui-windows-amd64.zip' | head -1)
          if [ -z "$ZIP_PATH" ]; then
            echo "Windows zip not found"; exit 1
          fi
          SHA=$(sha256sum "$ZIP_PATH" | awk '{print $1}')

          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${VERSION}"

          MANIFEST=$(cat <<ENDJSON
          {
            "version": "${VERSION_NUM}",
            "description": "GUI session manager for Claude Code + Codex (Wails + xterm.js)",
            "homepage": "https://github.com/welcomra1n/csm-gui",
            "license": "MIT",
            "architecture": {
              "64bit": {
                "url": "${BASE_URL}/csm-gui-windows-amd64.zip",
                "hash": "${SHA}"
              }
            },
            "extract_dir": "",
            "bin": [["csm.exe", "csm-gui"]],
            "shortcuts": [["csm.exe", "csm GUI"]],
            "checkver": "github",
            "autoupdate": {
              "architecture": {
                "64bit": {
                  "url": "https://github.com/welcomra1n/csm-gui/releases/download/v\$version/csm-gui-windows-amd64.zip"
                }
              }
            }
          }
          ENDJSON
          )

          CONTENT_BASE64=$(echo "${MANIFEST}" | base64 -w0)

          FILE_SHA=$(gh api "repos/welcomra1n/scoop-bucket/contents/bucket/csm-gui.json" \
            --jq '.sha' 2>/dev/null || echo "")

          if [ -n "${FILE_SHA}" ]; then
            gh api "repos/welcomra1n/scoop-bucket/contents/bucket/csm-gui.json" \
              --method PUT \
              --field message="Update csm-gui to ${VERSION}" \
              --field content="${CONTENT_BASE64}" \
              --field sha="${FILE_SHA}"
          else
            gh api "repos/welcomra1n/scoop-bucket/contents/bucket/csm-gui.json" \
              --method PUT \
              --field message="Add csm-gui manifest at ${VERSION}" \
              --field content="${CONTENT_BASE64}"
          fi
