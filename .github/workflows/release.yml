name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin/universal
            artifact: csm-gui-darwin
            ext: ""
          - os: windows-latest
            platform: windows/amd64
            artifact: csm-gui-windows-amd64
            ext: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          wails build -platform darwin/universal -clean
          cd build/bin
          ditto -c -k --sequesterRsrc --keepParent csm.app csm-gui-darwin.zip

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          wails build -platform windows/amd64 -clean
          cd build/bin
          Compress-Archive -Path csm.exe -DestinationPath csm-gui-windows-amd64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/bin/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
